<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastGPT 工具页</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/fastgpt.css') }}">
</head>

<body>
<div class="page">
    <header class="top-header">
        <div class="header-left">
            <a class="logo" href="/">FastGPT 工具页</a>
            <span class="header-desc">AI 工具入口</span>
        </div>

        <div class="header-right">
            <a class="header-link" href="/">返回首页</a>
        </div>
    </header>

    <main class="content">
        <section class="content-section active">
            <div class="section-header">
                <div>
                    <h1>FastGPT 工作流</h1>
                    <p>这里的工具来自 <code>data/fastgpt_tools.json</code></p>
                </div>
            </div>

            <div class="tool-grid">
                {% for tool in tools %}
                <div class="tool-card">
                    <div class="tool-card-header">
                        <span class="tool-category">{{ tool.category }}</span>
                    </div>

                    <h2>{{ tool.title }}</h2>
                    <p>{{ tool.desc }}</p>

                    {% if tool.url %}
                    <a class="open-btn" href="{{ tool.url }}" target="_blank">
                        打开工具
                    </a>
                    {% else %}
                    <span class="empty-url">暂未配置链接</span>
                    {% endif %}
                </div>
                {% else %}
                <div class="doc-card">
                    <p>当前还没有工具数据，请先检查 <code>data/fastgpt_tools.json</code>。</p>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>
</div>
</body>
</html>
