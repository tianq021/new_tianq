<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试V1</title>
</head>
<body>
    <div>
        <h1>打开 FastGPT 调用页面</h1>
        <a href="/fastgpt">使用</a>
    </div>

    <div>
        <h2>本地时间显示</h2>
        <p>当前时间：<span id="timeText">加载中...</span></p>
    </div>

    <script>
        function showLocalTime() {
            const now = new Date();

            const timeText = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + ' ' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0') + ':' +
                String(now.getSeconds()).padStart(2, '0');

            document.getElementById('timeText').innerText = timeText;
        }

        // 页面打开立刻显示一次
        showLocalTime();

        // 每秒刷新一次
        setInterval(showLocalTime, 1000);
    </script>
</body>
</html>
