<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地工具首页</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>
    <main class="page">
        <section class="card">

            <h1>FastGPT 调用页面</h1>

            <p class="desc">
                这是项目首页入口，可以从这里进入 FastGPT 调用页面，也可以用于后续添加更多测试工具、接口测试页面和数据分析页面。
            </p>

            <div class="actions">
                <a class="action-card" href="/fastgpt">
                    <p class="action-title">打开 FastGPT 页面</p>
                    <p class="action-desc">进入当前项目的 FastGPT 调用与测试页面。</p>
                </a>

                <a class="action-card" href="/tools">
                    <p class="action-title">打开 通用工具 页面</p>
                    <p class="action-desc">通用工具 测试</p>
                </a>
            </div>

            <div class="time-box">
                <p class="time-title">本地时间</p>
                <p class="time-text">
                    当前时间：
                    <span id="timeText" aria-live="polite">加载中...</span>
                </p>
            </div>
        </section>

    </main>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
