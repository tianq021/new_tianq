<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地工具工作台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>
    <main class="page">
        <section class="workspace-layout">
            <aside class="left-panel">
                <header class="workspace-header">
                    <div>
                        <p class="eyebrow">Local Workspace</p>
                        <h1>本地工具工作台</h1>
                        <p class="desc">选择一个功能开始使用。</p>
                    </div>
                    <a class="logout-link" href="{{ url_for('page.logout') }}">退出登录</a>
                </header>

                <section class="tool-section" aria-labelledby="toolSectionTitle">
                    <div class="section-heading">
                        <div>
                            <h2 id="toolSectionTitle">功能</h2>
                            <p>当前可用 2 个模块。</p>
                        </div>
                    </div>

                    <div class="tool-list">
                        <a class="tool-card" href="{{ url_for('page.fastgpt') }}">
                            <span class="tool-tag ai">AI</span>
                            <div>
                                <h3>FastGPT 调用</h3>
                                <p>工作流调用与接口测试。</p>
                            </div>
                        </a>

                        <a class="tool-card" href="{{ url_for('page.tools') }}">
                            <span class="tool-tag utility">Tools</span>
                            <div>
                                <h3>通用工具</h3>
                                <p>哈希、Base64、评论区等工具。</p>
                            </div>
                        </a>
                    </div>
                </section>

                <section class="info-section" aria-labelledby="infoSectionTitle">
                    <div class="section-heading">
                        <div>
                            <h2 id="infoSectionTitle">信息</h2>
                            <p>本地调试信息。</p>
                        </div>
                    </div>

                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">当前时间</span>
                            <strong id="timeText" aria-live="polite">加载中...</strong>
                        </div>
                        <div class="info-item">
                            <span class="info-label">访问者 IP</span>
                            <strong>{{ user_ip }}</strong>
                        </div>
                        <div class="info-item">
                            <span class="info-label">服务器 IP</span>
                            <strong>{{ server_ip }}</strong>
                        </div>
                    </div>
                </section>
            </aside>

            <section class="right-panel" aria-label="预留区域"></section>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
